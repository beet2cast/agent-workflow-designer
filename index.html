<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent 工作流教学演示器</title>
<style>
:root {
  --bg: #f0f2f5; --bg-card: #fff; --bg-canvas: #f5f6fa; --bg-hover: #f0f2ff;
  --text: #1d2129; --text-sec: #4e5969; --text-muted: #86909c;
  --border: #e5e6eb; --accent: #4e6af2; --accent-hover: #3b5ce0; --accent-light: rgba(78,106,242,.1);
  --shadow: 0 2px 8px rgba(0,0,0,.06); --shadow-lg: 0 8px 24px rgba(0,0,0,.1);
  --dot: #d6dae0; --log-bg: #fafafa; --panel-bg: #fff; --scroll: #c9cdd4;
  --green: #00b42a; --red: #f53f3f; --orange: #ff7d00; --blue: #4e6af2; --purple: #7b61ff; --teal: #14c9c9;
}
.dark {
  --bg: #17171a; --bg-card: #232324; --bg-canvas: #1f1f22; --bg-hover: #2b2b2e;
  --text: #e5e6eb; --text-sec: #a9abb3; --text-muted: #6b6f7a;
  --border: #37373a; --accent: #6b85ff; --accent-hover: #8599ff; --accent-light: rgba(107,133,255,.15);
  --shadow: 0 2px 8px rgba(0,0,0,.25); --shadow-lg: 0 8px 24px rgba(0,0,0,.4);
  --dot: #37373a; --log-bg: #1f1f22; --panel-bg: #232324; --scroll: #4a4a4d;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;user-select:none;font-size:14px;transition:background .2s,color .2s}
.header{height:48px;background:var(--panel-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;justify-content:space-between;flex-shrink:0;}
.logo{font-size:16px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo svg{width:22px;height:22px}
.hd-actions{display:flex;gap:8px;align-items:center}
.hd-actions button{height:32px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);font-size:13px;cursor:pointer;color:var(--text-sec);transition:all .15s;display:flex;align-items:center;gap:4px}
.hd-actions button:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
.hd-actions .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.hd-actions .btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.hd-actions .btn-icon{width:32px;padding:0;justify-content:center;font-size:16px}
.main{display:flex;height:calc(100vh - 48px)}
/* Left Panel */
.left{width:200px;background:var(--panel-bg);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;overflow-y:auto}
.left .sec{font-size:11px;color:var(--text-muted);font-weight:600;padding:8px 0 4px 4px;letter-spacing:.3px}
.drag-item{padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;cursor:grab;font-size:13px;display:flex;align-items:center;gap:8px;transition:all .15s;color:var(--text);}
.drag-item:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);transform:translateY(-1px)}
.drag-item:active{cursor:grabbing;transform:scale(.96)}
.drag-item .ic{font-size:16px;width:24px;text-align:center;flex-shrink:0}
/* Scenario Cards */
.scenario-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.scenario-card{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:6px;transition:all .2s;text-align:left}
.scenario-card:hover{border-color:var(--accent);background:var(--accent-light);transform:translateX(2px);box-shadow:var(--shadow)}
.scenario-card .sci{font-size:22px;flex-shrink:0;line-height:1}
.scenario-card .scb{flex:1;min-width:0}
.scenario-card .scn{font-weight:600;font-size:13px;color:var(--text);margin-bottom:3px}
.scenario-card .scd{font-size:11px;color:var(--text-muted);line-height:1.4;margin-bottom:4px}
.scenario-card .sct{display:flex;gap:4px;flex-wrap:wrap}
.scenario-card .sc-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--accent-light);color:var(--accent);font-weight:500}
/* Canvas */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg-canvas);background-image:radial-gradient(circle at 20px 20px, var(--dot) .7px, transparent .7px);background-size:40px 40px;cursor:grab}
.canvas-wrap.panning{cursor:grabbing}
#canvas{width:100%;height:100%;position:relative;transform-origin:0 0;z-index:5}
svg.connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6;transform-origin:0 0}
svg.connections path{pointer-events:stroke;cursor:pointer}
svg.connections path:hover{stroke-width:3.5!important;stroke-opacity:1!important}
@keyframes flow{0%{stroke-dashoffset:24}100%{stroke-dashoffset:0}}
/* Nodes */
.node-el{position:absolute;cursor:pointer;z-index:10;transition:z-index .15s}
.node-el:hover{z-index:20}
.node-card{background:var(--bg-card);border-radius:10px;border:1.5px solid var(--border);box-shadow:var(--shadow);position:relative;width:200px;transition:all .2s;overflow:visible}
.node-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px;transition:background .2s}
.node-card.selected{box-shadow:0 0 0 2px var(--accent-light);border-color:var(--accent)}
.node-card.status-running{animation:pulse .8s ease-in-out infinite}
.node-card.status-done{opacity:.85}.node-card.status-error{opacity:.85}
.node-head{display:flex;align-items:center;gap:8px;padding:12px 14px 8px;border-bottom:1px solid var(--border)}
.node-head .nic{font-size:18px;flex-shrink:0}
.node-head .ntit{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-head .nbadge{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg);color:var(--text-muted);font-weight:500;flex-shrink:0}
.node-head .del-n{width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.node-el:hover .del-n{display:flex}.del-n:hover{transform:scale(1.15)}
.node-body{padding:6px 14px 8px;display:flex;gap:16px}
.node-body .ns{flex:1;min-width:0}
.ns-label{font-size:10px;color:var(--text-muted);margin-bottom:3px;display:flex;align-items:center;gap:4px;font-weight:500}
.ns-item{font-size:11px;color:var(--text-sec);padding:2px 0;display:flex;align-items:center;gap:4px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ns-item .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
/* Port */
.port{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--bg-card);border:2px solid var(--accent);z-index:15;cursor:crosshair;transition:all .15s}
.port:hover{transform:scale(1.4);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);background:rgba(78,106,242,.15)}
.port-left{left:-7px;top:50%;transform:translateY(-50%)}.port-left:hover{transform:translateY(-50%) scale(1.4)}
.port-right{right:-7px;top:50%;transform:translateY(-50%)}.port-right:hover{transform:translateY(-50%) scale(1.4)}
.port.snap-hover{transform:translateY(-50%) scale(1.6)!important;border-color:#00b42a;background:rgba(0,180,42,.2);box-shadow:0 0 8px rgba(0,180,42,.5)}
/* Splash */
.splash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.7);backdrop-filter:blur(6px);padding:28px 40px;border-radius:16px;text-align:center;color:var(--text-muted);font-size:13px;pointer-events:none;z-index:1;border:1px solid rgba(255,255,255,.5);line-height:1.8}
.dark .splash{background:rgba(35,35,36,.75);border-color:rgba(55,55,58,.5)}
.splash strong{color:var(--accent)}
/* Right */
.right{width:340px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.r-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel-bg);flex-shrink:0;overflow-x:auto}
.r-tab{padding:8px 11px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.r-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.r-tab:hover{color:var(--text-sec)}
.r-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.r-body .rc{display:none;flex-direction:column;height:100%;overflow:hidden}
.r-body .rc.active{display:flex}
/* Config */
.cfg{padding:12px 14px;overflow-y:auto;flex:1}
.cfg .empty{color:var(--text-muted);text-align:center;padding:30px 0;font-size:13px}
.cfg label{font-size:12px;font-weight:600;color:var(--text-sec);display:block;margin-bottom:4px}
.cfg input,.cfg textarea,.cfg select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:var(--bg);color:var(--text);margin-bottom:10px}
.cfg input:focus,.cfg textarea:focus{border-color:var(--accent)}
.cfg textarea{resize:vertical;min-height:50px;font-size:12px}
.cfg .row{display:flex;gap:8px;margin-bottom:10px}
.cfg .row>*{flex:1}
.cfg .hint{font-size:11px;color:var(--text-muted);margin-bottom:8px;line-height:1.4}
/* API */
.api{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--log-bg)}
.api .t{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:4px}
.api .f{display:none;flex-direction:column;gap:6px;margin-top:10px}
.api .f.open{display:flex}
.api .f select,.api .f input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:var(--bg-card);color:var(--text)}
.api .f select:focus,.api .f input:focus{border-color:var(--accent)}
.api .f .r{display:flex;gap:6px}
.api .f .r button{padding:5px 12px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;cursor:pointer;font-weight:500;flex-shrink:0}
.api .f .r button:hover{background:var(--accent-hover)}
.st{font-size:11px;color:var(--green);flex:1;display:flex;align-items:center}
/* Panels */
.log-p,.vars-p,.res-p,.val-p{flex:1;overflow:auto;padding:6px 10px;font-size:12px;font-family:'SF Mono',Menlo,monospace;line-height:1.5;background:var(--log-bg)}
.empty-msg{color:var(--text-muted);text-align:center;padding:20px 0;font-size:12px}
.log-i{padding:2px 0;border-bottom:1px solid var(--border)}
.log-t{color:var(--text-muted);margin-right:6px;font-size:11px}.log-info{color:var(--text-sec)}.log-success{color:var(--green)}.log-warn{color:var(--orange)}.log-error{color:var(--red)}
.res-p{white-space:pre-wrap;font-size:12px}
.var-i{padding:3px 0;border-bottom:1px solid var(--border)}.var-k{color:var(--accent);font-weight:600}.var-v{color:var(--text);word-break:break-all}
/* Tutorial Panel */
.tutorial-wrap{flex:1;overflow-y:auto;padding:12px 14px}
.tut-summary{background:var(--accent-light);border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid var(--border)}
.tut-summary h3{font-size:14px;color:var(--accent);margin-bottom:6px;font-weight:700}
.tut-summary p{font-size:12px;color:var(--text-sec);line-height:1.6;margin-bottom:4px}
.tut-summary .tu-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tut-summary .tu-meta span{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--bg);color:var(--text-muted);font-weight:500}
.tut-step{margin-bottom:14px;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg-card);transition:all .3s;position:relative}
.tut-step.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);background:var(--bg-hover)}
.tut-step .ts-num{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px}
.tut-step .ts-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.tut-step .ts-body{font-size:12px;color:var(--text-sec);line-height:1.7}
.tut-step .ts-io{display:flex;gap:16px;margin-top:8px;font-size:11px}
.tut-step .ts-io>div{flex:1;padding:6px 8px;border-radius:6px;background:var(--bg)}
.tut-step .ts-io .tsi-label{font-weight:600;color:var(--text-muted);margin-bottom:2px}
.tut-step .ts-io .tsi-val{color:var(--text)}
.tut-step .ts-concepts{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tut-step .ts-cpt{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(0,180,42,.1);color:var(--green);font-weight:600}
/* Teaching Bubble */
.teach-bubble{position:absolute;z-index:30;max-width:260px;background:var(--bg-card);border:2px solid var(--accent);border-radius:12px;box-shadow:var(--shadow-lg);pointer-events:auto;animation:tbIn .3s ease-out}
@keyframes tbIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.teach-bubble .tb-header{padding:10px 14px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:6px}
.teach-bubble .tb-body{padding:10px 14px;font-size:12px;color:var(--text-sec);line-height:1.7}
.teach-bubble .tb-io{padding:6px 14px;display:flex;gap:12px;font-size:11px;border-top:1px solid var(--border)}
.teach-bubble .tb-io>span{color:var(--text-muted)}
.teach-bubble .tb-io>span b{color:var(--text);font-weight:600}
.teach-bubble .tb-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center}
.teach-bubble .tb-footer button{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:11px;cursor:pointer;color:var(--text-sec);font-weight:500;transition:all .15s}
.teach-bubble .tb-footer button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.teach-bubble .tb-footer .tb-step{font-size:10px;color:var(--text-muted);flex:1;text-align:right}
/* Step bar */
.step-bar{display:none;padding:6px 10px;background:var(--panel-bg);border-top:1px solid var(--border);gap:6px;align-items:center;flex-shrink:0}
.step-bar.active{display:flex}
.step-bar button{height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);font-size:11px;cursor:pointer;color:var(--text-sec);font-weight:500;transition:all .15s}
.step-bar button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.step-bar button:disabled{opacity:.4;cursor:not-allowed}
.step-bar .si{font-size:11px;color:var(--text-muted);flex:1;text-align:right}
/* Context menu */
.ctx-menu{position:fixed;background:var(--bg-card);border-radius:10px;box-shadow:var(--shadow-lg);padding:4px 0;z-index:99999;min-width:150px;border:1px solid var(--border)}
.ctx-item{padding:7px 16px;font-size:12px;color:var(--text);cursor:pointer;transition:all .12s;font-weight:500}
.ctx-item:hover{background:var(--bg-hover);color:var(--accent)}
.ctx-item.danger{color:var(--red)}.ctx-item.danger:hover{background:rgba(245,63,63,.08)}
/* Edge label */
.edge-label{position:absolute;font-size:10px;color:var(--text-sec);background:var(--bg-card);padding:1px 6px;border-radius:4px;border:1px solid var(--border);pointer-events:none;z-index:6;white-space:nowrap;font-weight:600;transform:translate(-50%,-50%)}
/* Validator */
.val-sum{display:flex;gap:10px;padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;flex-shrink:0}
.val-sum span{padding:1px 6px;border-radius:4px;font-weight:600}
.vs-pass{background:#e8f9e8;color:var(--green)}.vs-warn{background:#fff3e8;color:var(--orange)}.vs-fail{background:#ffecec;color:var(--red)}
.dark .vs-pass{background:#0a2e0a}.dark .vs-warn{background:#2e1a0a}.dark .vs-fail{background:#2e0a0a}
.val-item{padding:4px 8px;margin-bottom:3px;border-radius:4px;font-size:11px;line-height:1.5}
.val-pass{background:#e8f9e8;color:var(--green)}.val-warn{background:#fff3e8;color:var(--orange)}.val-fail{background:#ffecec;color:var(--red)}
.dark .val-pass{background:#0a2e0a}.dark .val-warn{background:#2e1a0a}.dark .val-fail{background:#2e0a0a}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:20px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.flowing{animation:flow .6s linear infinite}
.error-line{animation:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="4" r="3"/><circle cx="5" cy="20" r="3"/><circle cx="19" cy="20" r="3"/><path d="M12 7v3M5 17l2-4M19 17l-2-4"/><path d="M7 13h10" stroke-width="2.5"/></svg> Agent 教学演示器</div>
  <div class="hd-actions">
    <button onclick="validateWf()">✓ 验证</button>
    <button onclick="exportImg()">🖼 导出</button>
    <button onclick="saveWf()">💾 保存</button>
    <button onclick="document.getElementById('loadInp').click()">📂 加载</button>
    <input id="loadInp" type="file" accept=".json" style="display:none" onchange="loadWf(event)" />
    <button class="btn-primary" id="runBtn" onclick="toggleRun()">▶ 运行</button>
    <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</div>

<div class="main">
  <!-- ===== Left: 节点 + 场景库 ===== -->
  <div class="left">
    <div class="sec">🧩 节点</div>
    <div class="drag-item" onmousedown="startDrag(event,'start')"><span class="ic">▶</span> 开始</div>
    <div class="drag-item" onmousedown="startDrag(event,'agent')"><span class="ic">⚡</span> 智能体</div>
    <div class="drag-item" onmousedown="startDrag(event,'condition')"><span class="ic">◆</span> 条件</div>
    <div class="drag-item" onmousedown="startDrag(event,'parallel')"><span class="ic">⇄</span> 并行</div>
    <div class="drag-item" onmousedown="startDrag(event,'end')"><span class="ic">⏹</span> 结束</div>
    <div class="scenario-wrap">
      <div class="sec">🎓 教学场景</div>
      <div id="scenarioList"></div>
    </div>
  </div>

  <!-- ===== Canvas ===== -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="splash" id="splash"><strong>选一个教学场景开始学习吧 👈</strong><br/>或从左侧拖拽节点自由设计<br/>从 <span style="color:var(--accent)">●</span> 拖到另一个 <span style="color:var(--accent)">●</span> 松手即连</div>
    <svg class="connections" id="connections"></svg>
    <div id="canvas"></div>
  </div>

  <!-- ===== Right: 配置 / 教程 / 变量 / 日志 / 结果 / 检查 ===== -->
  <div class="right">
    <div class="api">
      <div class="t" onclick="togApi()">⚙️ API 设置 <span id="apiArr">▶</span></div>
      <div class="f" id="apiForm">
        <select id="apiProv" onchange="onProvChange()">
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="aliyun">阿里百炼</option>
          <option value="doubao">豆包/火山</option>
          <option value="qwen">通义千问</option>
          <option value="custom">自定义</option>
        </select>
        <input id="apiBase" placeholder="Base URL" />
        <input id="apiKey" placeholder="API Key" type="password" />
        <select id="apiModel"></select>
        <div class="r"><button onclick="testApi()">测试</button><span class="st" id="apiStatus">未连接</span></div>
      </div>
    </div>

    <div class="r-tabs">
      <div class="r-tab active" onclick="switchTab('cfg')">配置</div>
      <div class="r-tab" onclick="switchTab('tutorial')">教程</div>
      <div class="r-tab" onclick="switchTab('vars')">变量</div>
      <div class="r-tab" onclick="switchTab('log')">日志</div>
      <div class="r-tab" onclick="switchTab('res')">结果</div>
      <div class="r-tab" onclick="switchTab('val')">检查</div>
    </div>

    <div class="r-body">
      <div class="rc active" id="rcCfg"><div class="cfg" id="cfgPane"><div class="empty">点击节点进行配置</div></div></div>
      <div class="rc" id="rcTutorial"><div class="tutorial-wrap" id="tutorialPane"><div class="empty-msg">加载教学场景后查看</div></div></div>

function loadScenario(id){
  if(sim)return;
  const sc=SCENARIOS[id];if(!sc)return;
  if(nodes.length&&!confirm(`加载「${sc.name}」将清空画布，确定？`))return;
  nodes=[];edges=[];sel=null;nIdCnt=0;eIdCnt=0;activeScenario=sc;teachStepIdx=-1;
  clearLogs();document.getElementById('splash').style.display='none';
  document.getElementById('resPane').innerHTML='<div class="empty-msg">运行后查看结果</div>';

  // Load nodes
  sc.graph.nodes.forEach(nd=>{
    const id=nd.id||uid();
    nodes.push({...nd,id,isRunning:false,_status:'idle',_fold:false,_bp:false});
    if(parseInt(id.replace('n',''))>nIdCnt)nIdCnt=parseInt(id.replace('n',''));
  });

  // Load edges
  sc.graph.edges.forEach(ed=>{
    edges.push({id:euid(),...ed,_flow:false});
  });

  // Render tutorial
  renderTutorial();

  saveSnap();rAll();
  addLog(`📚 加载场景: ${sc.name} (${sc.nodes}个节点, ${sc.knowledge.length}个知识点)`,'success');
  switchTab('tutorial');
}

// ===== Undo =====
function saveSnap(){const sn={nodes:nodes.map(n=>({...n,_status:void 0,isRunning:false})),edges:edges.map(e=>({...e,_flow:false}))};
  hist=hist.slice(0,histIdx+1);hist.push(sn);if(hist.length>50)hist.shift();histIdx=hist.length-1}
function undo(){if(histIdx<=0)return;histIdx--;restore(hist[histIdx])}
function redo(){if(histIdx>=hist.length-1)return;histIdx++;restore(hist[histIdx])}
function restore(s){nodes=s.nodes.map(n=>({...n,_status:'idle',isRunning:false}));edges=s.edges.map(e=>({...e,_flow:false}));sel=null;rAll();loadCfg(null);
  document.getElementById('splash').style.display=nodes.length?'none':'';document.getElementById('resPane').textContent=''}
document.addEventListener('keydown',function(e){
  if(e.target.closest('input,textarea,select'))return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo()}
  if((e.ctrlKey||e.metaKey)&&(e.key==='Z'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo()}
  if(e.key==='Delete'||e.key==='Backspace'){if(sel&&!sim){delNode(sel);sel=null}}
  if(e.key==='Escape'){closeCtx();sel=null;loadCfg(null);rAll()}
});

function rAll(){rNodes();rEdges()}
function rNodes(){const c=document.getElementById('canvas');c.innerHTML='';const f=document.createDocumentFragment();

function rEdges(){
  const svg=document.getElementById('connections');let html='';const labels=[];
  document.querySelectorAll('.edge-label').forEach(el=>el.remove());
  edges.forEach(e=>{const sn=nodes.find(n=>n.id===e.source),tn=nodes.find(n=>n.id===e.target);
    if(!sn||!tn)return;
    const srcSide=e.sourceSide||'right',tgtSide=e.targetSide||'left';
    const sp=getPortPos(sn,srcSide),tp=getPortPos(tn,tgtSide);
    const sx=sp.x,sy=sp.y,tx=tp.x,ty=tp.y;
    const cx=(sx+tx)/2;
    const path=`M${sx},${sy} C${cx},${sy} ${cx},${ty} ${tx},${ty}`;
    const isError=sn._status==='error'||tn._status==='error';
    const isFlow=e._flow;
    const color=isError?'#f53f3f':(isFlow?'#4e6af2':(e.color||'#4e6af2'));
    const dash=isFlow?'8,6':(e.dashed?'6,4':'none');
    const flow=isFlow?' flowing':(isError?' error-line':'');
    html+=`<path d="${path}" stroke="${color}" stroke-width="2" fill="none" stroke-dasharray="${dash}" opacity="${isError?'1':'.7'}" class="${flow}" onclick="delEdge('${e.id}')" title="点击删除"/>`;
    if(e.label){const mx=(sx+tx)/2,my=(sy+ty)/2-14;labels.push({l:e.label,x:mx,y:my})}
  });
  svg.innerHTML=html;
  labels.forEach(l=>{const el=document.createElement('div');el.className='edge-label';el.textContent=l.l;
    el.style.left=l.x+'px';el.style.top=l.y+'px';document.getElementById('canvas').appendChild(el)});
  document.querySelectorAll('.edge-label').forEach(el=>{el.style.transform=`translate(-50%,-50%) scale(${1/zoom})`});
}
function getPortPos(node,side){
  const el=document.getElementById('n-'+node.id);
  if(!el){const cy=node.y+NH/2;return side==='right'?{x:node.x+NW,y:cy}:{x:node.x,y:cy}}
  const port=el.querySelector(side==='right'?'.port-right':'.port-left');
  if(!port){const cy=node.y+NH/2;return side==='right'?{x:node.x+NW,y:cy}:{x:node.x,y:cy}}
  const pr=port.getBoundingClientRect(),wr=document.getElementById('canvasWrap').getBoundingClientRect();
  const cx=pr.left+pr.width/2-wr.left,cy=pr.top+pr.height/2-wr.top;
  return{x:(cx-panX)/zoom,y:(cy-panY)/zoom}
}

// ===== Connections =====
function startConn(e,fromId,fromSide){
  if(sim)return;
  e.preventDefault();
  _conn={from:fromId,fromSide:fromSide};
  const wrap=document.getElementById('canvasWrap');
  _conn._wrapRect=wrap.getBoundingClientRect();
  document.addEventListener('mousemove',onConn);
  document.addEventListener('mouseup',endConn2);
}
function onConn(e){
  if(!_conn)return;
  const svg=document.getElementById('connections'),wrap=document.getElementById('canvasWrap');
  const rect=wrap.getBoundingClientRect();
  const fn=nodes.find(n=>n.id===_conn.from);if(!fn)return;
  const sp=getPortPos(fn,_conn.fromSide||'right');
  const sx=sp.x,sy=sp.y;
  const mx_vp=e.clientX-rect.left,my_vp=e.clientY-rect.top;
  const mx=(mx_vp-panX)/zoom,my=(my_vp-panY)/zoom;
  let snap=null,snapD=Infinity;
  document.querySelectorAll('.port').forEach(el=>{
    const er=el.getBoundingClientRect();
    const ecx_vp=er.left+er.width/2-rect.left,ecy_vp=er.top+er.height/2-rect.top;
    const d=Math.hypot(mx_vp-ecx_vp,my_vp-ecy_vp);
    if(d<40&&d<snapD&&el.dataset.node!==_conn.from){snapD=d;snap={nodeId:el.dataset.node,side:el.dataset.pT}}
  });
  document.querySelectorAll('.port.snap-hover').forEach(el=>el.classList.remove('snap-hover'));
  if(snap){
    const targetPort=document.querySelector(`#n-${snap.nodeId} .port[data-p-t="${snap.side}"]`);
    if(targetPort)targetPort.classList.add('snap-hover');
  }
  const tx=snap?(getPortPos(nodes.find(n=>n.id===snap.nodeId)||fn,snap.side||'left').x):mx;
  const ty=snap?(getPortPos(nodes.find(n=>n.id===snap.nodeId)||fn,snap.side||'left').y):my;
  const cx=(sx+tx)/2;
  const d=`M${sx},${sy} C${cx},${sy} ${cx},${ty} ${tx},${ty}`;
  document.querySelectorAll('.temp-line').forEach(el=>el.remove());
  const line=document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d',d);line.classList.add('temp-line');
  line.style.cssText='stroke:#4e6af2;stroke-width:2.5;stroke-dasharray:6,6;fill:none;opacity:.9';
  svg.appendChild(line);
  _conn._snapTarget=snap;
}
function endConn2(e){
  document.removeEventListener('mousemove',onConn);
  document.removeEventListener('mouseup',endConn2);
  document.querySelectorAll('.temp-line').forEach(el=>el.remove());
  document.querySelectorAll('.port.snap-hover').forEach(el=>el.classList.remove('snap-hover'));
  if(!_conn)return;
  if(_conn._snapTarget){
    finishConn(_conn._snapTarget.nodeId,_conn._snapTarget.side)
  }
  _conn=null;
}
function finishConn(targetId,targetSide){
  if(!_conn){return}
  const fromId=_conn.from,fromSide=_conn.fromSide||'right';
  if(fromId===targetId){_conn=null;return}
  if(edges.some(e=>e.source===fromId&&e.target===targetId)){_conn=null;return}
  edges.push({id:euid(),source:fromId,target:targetId,sourceSide:fromSide,targetSide:targetSide||'left',color:'#4e6af2',width:2,label:''});
  const fn=nodes.find(n=>n.id===fromId),tn=nodes.find(n=>n.id===targetId);
  addLog(`连线: ${fn?.label} → ${tn?.label}`,'success');
  saveSnap();rAll();_conn=null;
}

// ===== Node ops =====
function addN(type,x,y){
  const dfl={start:{label:'开始',role:'',prompt:'',inputDesc:'用户问题',outputDesc:'问题文本',transform:''},
    end:{label:'结束',role:'',prompt:'',inputDesc:'处理结果',outputDesc:'最终输出',transform:''},
    agent:{label:'智能体',role:'',prompt:'',inputDesc:'',outputDesc:'',transform:''},
    condition:{label:'条件',role:'',prompt:'',inputDesc:'',outputDesc:'',transform:''},
    parallel:{label:'并行',role:'',prompt:'',inputDesc:'',outputDesc:'',transform:''}};
  const d=dfl[type]||dfl.agent;const id=uid();
  nodes.push({id,type,x,y,...d,isRunning:false,_status:'idle',_fold:false,_bp:false});
  saveSnap();rAll();addLog(`添加: ${d.label}`,'success');
  document.getElementById('splash').style.display='none';sel=id;loadCfg(id);
}
function addND(type,x,y,data){const id=uid();nodes.push({id,type,x,y,...data,isRunning:false,_status:'idle',_fold:false,_bp:false})}
function delNode(id){const n=nodes.find(i=>i.id===id);if(!n||sim)return

  nodes=nodes.filter(i=>i.id!==id);edges=edges.filter(e=>e.source!==id&&e.target!==id);

function delEdge(id){if(sim)return;if(!confirm('删除连线？'))return;
  edges=edges.filter(e=>e.id!==id);saveSnap();rEdges();addLog('删除连线','warn')}

function togBp(id){const n=nodes.find(i=>i.id===id);if(n)n._bp=!n._bp;rAll();addLog(n?`${n._bp?'设置':'取消'}断点: ${n.label}`:'','info')}

// Move
function onMove(e){if(!_move)return;const n2=nodes.find(n=>n.id===_move.id);if(!n2)return;
  n2.x=Math.max(0,_move.oX+e.clientX-_move.sX);n2.y=Math.max(0,_move.oY+e.clientY-_move.sY);

// Canvas zoom/pan
document.getElementById('canvasWrap').addEventListener('wheel',function(e){e.preventDefault();
  const r=this.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const d=e.deltaY>0?.9:1.1,nz=Math.max(.2,Math.min(3,zoom*d));
  panX=mx-(mx-panX)/zoom*nz;panY=my-(my-panY)/zoom*nz;zoom=nz;applyT()},{passive:false});
document.getElementById('canvasWrap').addEventListener('mousedown',function(e){

function onPan(e){if(!_pan)return;panX=_pan.oX+(e.clientX-_pan.sX);panY=_pan.oY+(e.clientY-_pan.sY);applyT()}

  }
  h+=`<label>输入描述</label><input id="cIn" value="${eH(n.inputDesc||'')}" placeholder="这个节点的输入是什么" />
    <label>输出描述</label><input id="cOut" value="${eH(n.outputDesc||'')}" placeholder="这个节点的输出是什么" />
    <label>处理逻辑</label><textarea id="cTf" rows="2" placeholder="节点处理逻辑描述">${eH(n.transform||'')}</textarea>`;
  h+=`<div class="row"><button class="btn-primary" onclick="saveCfg('${id}')" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;cursor:pointer;font-weight:500">保存</button>
    <button onclick="aiGen('${id}')" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text-sec)">✨ AI生成</button></div>`;
  h+=`<label style="display:flex;align-items:center;gap:6px;font-weight:400;font-size:12px;margin-top:4px;cursor:pointer"><input type="checkbox" ${n._bp?'checked':''} onchange="togBp('${id}')" /> 运行到此暂停（断点）</label>`;
  c.innerHTML=h}
function saveCfg(id){const n=nodes.find(i=>i.id===id);if(!n)return;
  n.label=document.getElementById('cName').value||n.label;
  n.inputDesc=document.getElementById('cIn').value;
  n.outputDesc=document.getElementById('cOut').value;
  const tf=document.getElementById('cTf');if(tf)n.transform=tf.value;
  const rl=document.getElementById('cRole');if(rl)n.role=rl.value;
  const pm=document.getElementById('cPrompt');if(pm)n.prompt=pm.value;
  saveSnap();rAll();addLog(`已更新: ${n.label}`,'info');sel=id;loadCfg(id)}
async function aiGen(id){const n=nodes.find(i=>i.id===id);if(!n)return;
  const a=getApi();if(!a.key){alert('请先配置API Key');return}
  const p=`你是工作流设计助手。根据以下节点信息生成一段中文描述（100字内）：\n类型: ${n.type}\n名称: ${n.label}\n输入: ${n.inputDesc||'无'}\n输出: ${n.outputDesc||'无'}\n输出描述其处理逻辑。`;
  try{const r=await fetch(a.base+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.key},body:JSON.stringify({model:a.model,messages:[{role:'user',content:p}],temperature:.7,maxTokens:150})});
    if(!r.ok)throw new Error('API请求失败: '+r.status);
    const d=await r.json(),c=d.choices[0].message.content.trim();
    const tf=document.getElementById('cTf');if(tf)tf.value=c;addLog('AI生成成功','success')
  }catch(err){alert('生成失败: '+err.message);addLog('AI失败: '+err.message,'error')}}

// Save/Load
function saveWf(){if(!nodes.length){addLog('画布为空','warn');return}
  const d={v:'7.0',t:new Date().toISOString(),nodes:nodes.map(n=>({...n,_status:void 0,isRunning:false})),edges:edges.map(e=>({...e,_flow:false}))};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`wf-${Date.now()}.json`;a.click();URL.revokeObjectURL(a.href);addLog('已保存','success')}
function loadWf(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(!d.nodes||!d.edges)throw new Error('无效');
    if(nodes.length&&!confirm('清空画布？'))return;
    nodes=d.nodes.map(n=>({...n,role:n.role||'',prompt:n.prompt||'',isRunning:false,_status:'idle',_bp:false}));edges=d.edges.map(e=>({...e,_flow:false}));sel=null;activeScenario=null;teachStepIdx=-1;
    nIdCnt=Math.max(...nodes.map(n=>parseInt(n.id.replace('n',''))||0),0);
    eIdCnt=Math.max(...edges.map(e=>parseInt(e.id.replace('e',''))||0),0);
    document.getElementById('splash').style.display='none';document.getElementById('resPane').innerHTML='<div class="empty-msg">运行后查看结果</div>';
    document.getElementById('tutorialPane').innerHTML='<div class="empty-msg">加载教学场景后查看</div>';
    saveSnap();rAll();loadCfg(null);addLog(`加载: ${d.nodes.length}节点, ${d.edges.length}连线`,'success')
  }catch(err){alert('文件错误: '+err.message)}};r.readAsText(f);e.target.value=''}

// Export image
function exportImg(){if(!nodes.length){addLog('画布为空','warn');return}
  const mx=Math.min(...nodes.map(n=>n.x))-20,MX=Math.max(...nodes.map(n=>n.x+NW))+20;
  const my=Math.min(...nodes.map(n=>n.y))-20,MY=Math.max(...nodes.map(n=>n.y+NH))+20;
  const w=MX-mx+40,h=MY-my+40;
  const oz=zoom,opx=panX,opy=panY;zoom=1;panX=0;panY=0;applyT();
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  const x=cv.getContext('2d');
  x.fillStyle=document.body.classList.contains('dark')?'#1f1f22':'#f5f6fa';x.fillRect(0,0,w,h);
  x.strokeStyle=document.body.classList.contains('dark')?'#37373a':'#d6dae0';x.lineWidth=.5;
  for(let i=0;i<w;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,h);x.stroke();x.beginPath();x.moveTo(0,i);x.lineTo(w,i);x.stroke()}
  edges.forEach(e=>{const sn=nodes.find(n=>n.id===e.source),tn=nodes.find(n=>n.id===e.target);if(!sn||!tn)return;
    const sp=getPortPos(sn,e.sourceSide||'right'),tp=getPortPos(tn,e.targetSide||'left');
    const sx=sp.x-mx+20,sy=sp.y-my+20,tx=tp.x-mx+20,ty=tp.y-my+20,c=(sx+tx)/2;
    x.beginPath();x.moveTo(sx,sy);x.bezierCurveTo(c,sy,c,ty,tx,ty);
    x.strokeStyle=e.color||'#4e6af2';x.lineWidth=2;x.setLineDash(e.dashed?[6,4]:[]);x.stroke();x.setLineDash([]);
    if(e.label){x.fillStyle=document.body.classList.contains('dark')?'#e5e6eb':'#4e5969';x.font='11px sans-serif';x.textAlign='center';x.fillText(e.label,(sx+tx)/2,(sy+ty)/2-14)}});
  nodes.forEach(n=>{const s=ST[n.type]||ST.agent;const x2=n.x-mx+20,y2=n.y-my+20;
    x.shadowColor='rgba(0,0,0,.06)';x.shadowBlur=8;x.shadowOffsetY=2;
    x.fillStyle='#fff';x.strokeStyle=s.border;x.lineWidth=1.5;
    x.beginPath();x.roundRect(x2,y2,NW,72,10);x.fill();x.stroke();x.shadowColor='transparent';
    x.fillStyle='#333';x.font='600 13px sans-serif';x.textAlign='left';x.fillText(s.icon+' '+(n.label||'未命名'),x2+14,y2+32);
    if(n.inputDesc){x.fillStyle='#86909c';x.font='11px sans-serif';x.fillText('● '+(n.inputDesc||''),x2+14,y2+54)}
    if(n.outputDesc){x.fillStyle='#86909c';x.font='11px sans-serif';x.textAlign='right';x.fillText((n.outputDesc||'')+' ●',x2+NW-14,y2+54)}});
  const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download=`wf-${Date.now()}.png`;a.click();addLog('已导出图片','success');
  zoom=oz;panX=opx;panY=opy;applyT()}

// Validator
function validateWf(){const r=[];
  if(!nodes.length){r.push({l:'fail',m:'画布为空'});showVal(r);return}
  const link=new Set();edges.forEach(e=>{link.add(e.source);link.add(e.target)});
  nodes.forEach(n=>{if(!link.has(n.id))r.push({l:'warn',m:`"${n.label}"无连线`})});
  if(!nodes.some(n=>n.type==='start'))r.push({l:'warn',m:'无"开始"节点'});
  if(!edges.length)r.push({l:'fail',m:'无连线'});
  nodes.filter(n=>n.type==='condition').forEach(n=>{const o=edges.filter(e=>e.source===n.id);if(!o.length)r.push({l:'fail',m:`条件"${n.label}"无出边`});else if(o.length<2)r.push({l:'warn',m:`条件"${n.label}"只有1条出边`})});
  if(!nodes.some(n=>n.type==='end'))r.push({l:'warn',m:'无"结束"节点'});
  const adj={};nodes.forEach(n=>{adj[n.id]=[]});edges.forEach(e=>{if(adj[e.source])adj[e.source].push(e.target)});
  const vis=new Set(),stk=new Set(),cyc=[];
  (function dfs(id,p){if(stk.has(id)){cyc.push([...p,id].join('→'));return}if(vis.has(id))return;vis.add(id);stk.add(id);(adj[id]||[]).forEach(n=>dfs(n,[...p,id]));stk.delete(id)});
  nodes.forEach(n=>{if(!vis.has(n.id))dfs(n.id,[])});
  if(cyc.length)r.push({l:'fail',m:`检测${cyc.length}个循环: ${cyc[0]}`});
  if(!document.getElementById('apiKey').value.trim())r.push({l:'warn',m:'未配置API Key'});
  showVal(r)}
function showVal(r){const p=r.filter(x=>x.l==='pass').length,w=r.filter(x=>x.l==='warn').length,f=r.filter(x=>x.l==='fail').length;
  document.getElementById('valSum').innerHTML=`<span class="vs-pass">✓通过 ${p}</span><span class="vs-warn">⚠警告 ${w}</span><span class="vs-fail">✕失败 ${f}</span>`;
  if(!r.length)document.getElementById('valPane').innerHTML='<div style="padding:20px;text-align:center;color:var(--green)">✅ 全部通过</div>';
  else document.getElementById('valPane').innerHTML=r.map(x=>`<div class="val-item val-${x.l}">${x.l==='fail'?'✕':x.l==='warn'?'⚠':'✓'} ${eH(x.m)}</div>`).join('');
  switchTab('val')}

// ===== Run (enhanced with teaching) =====
const _teachSim = { paused: false, resume: null };

function toggleRun(){
  if(stepMode){exitStep();return}
  if(!sim){
    run();
  }
}

async function run(){
  if(sim)return;if(!nodes.length){addLog('画布为空','error');return}if(!edges.length){addLog('无连线','error');return}
  sim=true;document.getElementById('runBtn').disabled=true;document.getElementById('runBtn').textContent='⏳ 运行中';
  clearLogs();document.getElementById('resPane').innerHTML='';ctx={};teachStepIdx=-1;
  nodes.forEach(n=>{n.isRunning=false;n._status='idle'});rAll();addLog('🚀 开始运行','info');

  // Build teach map: nodeId -> tutorial step index
  const teachMap={};
  if(activeScenario){
    activeScenario.tutorial.steps.forEach((st,i)=>{teachMap[st.nodeId]=i});
  }

  const adj={};nodes.forEach(n=>{adj[n.id]=[]});edges.forEach(e=>{if(adj[e.source])adj[e.source].push(e.target)});
  let sn=nodes.filter(n=>n.type==='start');if(!sn.length){const hasIn={};edges.forEach(e=>{hasIn[e.target]=true});sn=nodes.filter(n=>!hasIn[n.id])}
  if(!sn.length)sn=[nodes[0]];const vis=new Set();let bpHit=false,exec=[];

  async function runN(id){
    const n=nodes.find(i=>i.id===id);if(!n||vis.has(id))return;vis.add(id);
    nodes.forEach(i=>{i.isRunning=false;i._status='idle'});n.isRunning=true;n._status='running';rAll();

    // Show teaching bubble if scenario loaded
    if(teachMap[id]!==undefined){
      showBubble(id,teachMap[id]);
      await slp(600); // Give user time to read
    }

    await slp(300);

    if(n._bp&&!bpHit){
      bpHit=true;sim=false;document.getElementById('runBtn').disabled=false;document.getElementById('runBtn').textContent='▶ 运行';
      addLog(`⏸ 断点: ${n.label}`,'warn');rVars();enterStep(exec,id);
      hideBubble();return;
    }

    try{
      let msg='';
      if(n.type==='start'){ctx={input:n.transform||'用户输入'};msg=`${n.label}: 初始化`;n._status='done'}
      else if(n.type==='end'){ctx.output=n.transform||'处理结果';msg=`${n.label}: 输出`;n._status='done'}
      else if(n.type==='condition'){
        let res=true,e2=n.transform||'';
        if(e2.includes('>=')){const p=e2.split('>=');if(p.length===2){const k=p[0].trim(),v=parseInt(p[1].trim());res=(ctx[k]||0)>=v}}
        else if(e2.includes('>')){const p=e2.split('>');if(p.length===2){const k=p[0].trim(),v=parseInt(p[1].trim());res=(ctx[k]||0)>v}}
        else if(e2==='intent'){
          // For 客服分流, route based on intent
          const intent=(ctx.intent||'').toLowerCase();
          if(intent.includes('退货')){ctx.conditionResult='退货';res=true}
          else if(intent.includes('咨询')){ctx.conditionResult='咨询';res=false}
          else if(intent.includes('投诉')){ctx.conditionResult='投诉';res=null}
          else{ctx.conditionResult='其他';res=false}
        }else{ctx.conditionResult=res}
        msg=`${n.label}: ${ctx.conditionResult||(res?'真':'假')}`;n._status='done';
        // Route all children
        const nxt=adj[n.id]||[];
        for(const t of nxt){
          const edgeLabel=(edges.find(e=>e.source===n.id&&e.target===t)?.label||'').toLowerCase();
          let follow=false;
          if(e2==='intent'){
            if(ctx.conditionResult==='退货'&&edgeLabel==='退货')follow=true;
            else if(ctx.conditionResult==='咨询'&&edgeLabel==='咨询')follow=true;
            else if(ctx.conditionResult==='投诉'&&edgeLabel==='投诉')follow=true;
          }else{
            follow=res?(edgeLabel!=='假'&&edgeLabel!=='false'&&edgeLabel!=='退回'):(edgeLabel==='假'||edgeLabel==='false'||edgeLabel==='退回');
          }
          if(follow&&!vis.has(t)){
            const edg=edges.find(e=>e.source===n.id&&e.target===t);if(edg){edg._flow=true;rEdges()}
            exec.push({n:t,from:id});await runN(t);if(edg){edg._flow=false;rEdges()}
          }
        }
        addLog(msg,'success');rAll();return;
      }else if(n.type==='parallel'){
        msg=`${n.label}: 分发给${(adj[n.id]||[]).length}个下游`;n._status='done';
        const ts=(adj[n.id]||[]).map(async t=>{if(!vis.has(t)){exec.push({n:t,from:id});await runN(t)}});
        await Promise.all(ts);rAll();addLog(msg,'success');return;
      }else{
        const d=n.transform||'处理数据';ctx[n.id]=d;
        // Simulate output based on role
        if(n.role?.includes('意图')){ctx.intent='退货退款'}
        else if(n.role?.includes('退货')){ctx.reply='退货流程已发送'}
        else if(n.role?.includes('咨询')){ctx.reply='产品说明已发送'}
        else if(n.role?.includes('投诉')){ctx.reply='投诉已受理'}
        else if(n.role?.includes('格式')){ctx.format_score=85}
        else if(n.role?.includes('质检')){ctx.quality=ctx.quality?Math.min(95,ctx.quality+10):75}
        else if(n.role?.includes('修改')){ctx.quality=(ctx.quality||70)+15;ctx.draft='修改完成'}
        msg=`${n.label}: ${d}`;n._status='done';
      }
      addLog(msg,'success');rAll();await slp(200);
      if(n.type!=='condition'&&n.type!=='parallel'){
        const nxt=adj[n.id]||[];
        for(const t of nxt){
          if(!vis.has(t)){
            const edg=edges.find(e=>e.source===n.id&&e.target===t);if(edg){edg._flow=true;rEdges()}
            exec.push({n:t,from:id});await runN(t);if(edg){edg._flow=false;rEdges()}
          }
        }
      }
    }catch(err){n._status='error';addLog(`${n.label} 出错: ${err.message}`,'error');rAll()}
  }

  for(const s of sn){if(!vis.has(s.id)){exec.push({n:s.id,from:null});await runN(s.id)}}

  if(!bpHit){
    hideBubble();
    const t='📊 执行完成\n\n上下文:\n'+JSON.stringify(ctx,null,2);showRes(t);addLog('✅ 运行完成','success');
    rVars();sim=false;document.getElementById('runBtn').disabled=false;document.getElementById('runBtn').textContent='▶ 运行';
    nodes.forEach(n=>{n.isRunning=false;n._status='idle'});rAll();
    if(activeScenario){switchTab('tutorial')}
  }
}

// Step
function enterStep(o,id){stepMode=true;stepQ=o;stepIdx=Math.max(0,o.findIndex(x=>x.n===id));
  document.getElementById('stepBar').classList.add('active');updStep();addLog('🔍 步进模式','info')}
function exitStep(){stepMode=false;sim=false;document.getElementById('stepBar').classList.remove('active');
  document.getElementById('runBtn').disabled=false;document.getElementById('runBtn').textContent='▶ 运行';
  nodes.forEach(n=>{n.isRunning=false;n._status='idle'});rAll();hideBubble();addLog('退出步进','info')}
function stepNext(){if(!stepMode||stepIdx>=stepQ.length-1)return;stepIdx++;
  const t=stepQ[stepIdx];if(t){sel=t.n;rAll();loadCfg(t.n);addLog(`步进: ${nodes.find(n=>n.id===t.n)?.label||t.n}`,'info')}updStep()}
function stepPrev(){if(!stepMode||stepIdx<=0)return;stepIdx--;
  const t=stepQ[stepIdx];if(t){sel=t.n;rAll();loadCfg(t.n);addLog(`回退: ${nodes.find(n=>n.id===t.n)?.label||t.n}`,'info')}updStep()}
function updStep(){document.getElementById('stepInfo').textContent=`${stepIdx+1}/${stepQ.length}`;
  document.getElementById('stepNextBtn').disabled=stepIdx>=stepQ.length-1}

// Init
function init(){
  initScenarioList();
  const a=(x,y,d)=>addND('agent',x,y,d),s=(x,y,d)=>addND('start',x,y,d),e=(x,y,d)=>addND('end',x,y,d);
  s(120,150,{label:'开始',role:'',prompt:'',inputDesc:'用户问题',outputDesc:'问题文本',transform:'用户输入'});
  a(400,150,{label:'处理',role:'',prompt:'',inputDesc:'问题',outputDesc:'回答',transform:'分析并生成回答'});
  e(680,150,{label:'结果',role:'',prompt:'',inputDesc:'回答',outputDesc:'最终回复',transform:'展示结果'});
  const ids=nodes.map(n=>n.id);
  edges.push({id:euid(),source:ids[0],target:ids[1],sourceSide:'right',targetSide:'left',color:'#4e6af2',width:2,label:''});
  edges.push({id:euid(),source:ids[1],target:ids[2],sourceSide:'right',targetSide:'left',color:'#4e6af2',width:2,label:''});
  rAll();document.getElementById('splash').style.display='none';addLog('默认工作流已加载 — 或从左侧选择一个教学场景 📚','info');
}

document.addEventListener('click',closeCtx);
nodes=[];edges=[];nIdCnt=0;eIdCnt=0;init();
if(nodes.length){sel=nodes[0].id;loadCfg(sel)}saveSnap();
onProvChange();
</script>
